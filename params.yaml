params

# The distance between the front and
# rear axle of the racecar
wheelbase: 0.287 # meters

# width of racecar
width: 0.342 # meters

# steering delay
buffer_length: 5

# Limits on the speed and steering angle
max_speed: 1.5 # meters/second
max_steering_angle: 0.4189 # radians
max_accel: 2.5 # meters/second^2
max_decel: 2.5 # meters/second^2
max_steering_vel: 3.2 # radians/second
friction_coeff: 0.523 # -
height_cg: 0.074 # m
l_cg2rear: 0.17145 # m
l_cg2front: 0.15875 # m
C_S_front: 4.718
C_S_rear: 5.4562
mass: 3.47 # kg
moment_inertia: 0.04712 # kg m^2

# The rate at which the pose and the lidar publish
update_pose_rate: 0.001

# Lidar simulation parameters
scan_beams: 720
scan_field_of_view: 6.2831853 # radians
scan_range: 12.0
scan_distance_to_base_link: 0.01286 # meters
scan_std_dev: 0.01 # meters
map_free_threshold: 0.8

# Time to collision cutoff value
ttc_threshold: 0.01

# Indices for mux controller
mux_size: 6
joy_mux_idx: 0
key_mux_idx: 1
random_walker_mux_idx: 2
brake_mux_idx: 3
nav_mux_idx: 4
new_method_mux_idx: -1
collision_assistance_mux_idx: 5

# Enables joystick if true
joy: true
joy_speed_axis: 1
joy_angle_axis: 3
joy_max_speed: 1.0 # meters/second
joy_button_idx: 4 # LB button
key_button_idx: 6
brake_button_idx: 0 # X button
random_walk_button_idx: 1 # A button
collision_assistance_button_idx: 2 # B button
nav_button_idx: 5 # RB button
new_button_idx: -1

# Keyboard characters for toggling mux
joy_key_char: "j"
keyboard_key_char: "k"
brake_key_char: "b"
random_walk_key_char: "r"
nav_key_char: "n"
new_key_char: "z"

# Keyboard driving params
keyboard_speed: 1.8 # meters/second
keyboard_steer_ang: 0.3 # radians

# obstacle parameters
obstacle_size: 2

# The names of topics to listen and publish to
joy_topic: "/joy"
drive_topic: "/drive"
map_topic: "/map"
distance_transform_topic: "/dt"
scan_topic: "/scan"
lidarscan_topic: "/scan"
pose_topic: "/pose"
ground_truth_pose_topic: "/gt_pose"
odom_topic: "/odom"
imu_topic: "/imu/data"
pose_rviz_topic: "/initialpose"
keyboard_topic: "/key"
brake_bool_topic: "/brake_bool"
mux_topic: "/mux"

# Topic names of various drive channels
rand_drive_topic: "/rand_drive"
brake_drive_topic: "/brake"
nav_drive_topic: "/nav"
new_drive_topic: "/new_drive"
collision_assistance_drive_topic: "/collision_assistance"

# name of file to write collision log to
collision_file: "collision_file"

# The names of the transformation frames published to
map_frame: "map"
base_frame: "base_link"
scan_frame: "laser"
odom_frame: "odom"
imu_frame: "imu"
broadcast_transform: true
publish_ground_truth_pose: true

# Experiment
speed_to_erpm_gain: 3182.12
speed_to_erpm_offset: 0.0
steering_angle_to_servo_gain: -0.88
steering_angle_to_servo_offset: 0.5000
driver_smoother_rate: 75.0 # messages/sec

# Occupancy grid map parameters
occ_map_topic: "map_occ"
p_occ: 0.8
p_free: 0.2
map_width: 120
map_height: 120
map_res: 0.15 # m
object_size: 0.05 # m

# Collision Assistance Algorithm Parameters
distance_to_obstacle_th: 1.0
force_gain: 8.0
velocity_correction_gain: 0.6
steering_correction_gain: 0.6
emergency_brake_active: true

# Legacy wall-following / gap-following parameters kept for compatibility
CenterOffset: 0
DistanceLeft: 0.9
DistanceRight: 0.9
TrackWall: 0
angle_bl: rad(270*pi/180)
angle_al: rad(200*pi/180)
angle_br: rad(90*pi/180)
angle_ar: rad(160*pi/180)
n_pts_l: 100
n_pts_r: 100
tau: 0.1
k_d: 4.0
k_p: 3.5
turn_velocity: 0.8
velocity_zero: 0.0
safe_distance: 0.5
right_beam_angle: rad(2*pi*4.0/16)
left_beam_angle: rad(2*pi*12.0/16)
turn_angle1: rad(pi/6)
turn_angle2: rad(pi/3)
stop_time1: 1.0
stop_time2: 1.0
heading_beam_angle: rad(pi/16)
stop_distance: 0.6 # m
stop_distance_decay: 1.0 # m
optim_mode: 0

# Line-following controller (Activity 4)
bl_angle_deg: 270.0
al_angle_deg: 220.0
br_angle_deg: 90.0
ar_angle_deg: 140.0
kp_linefollow: 8.0
kd_linefollow: 6.0
dlr_des: 0.0
vs_des: 1.5
delta_max: 0.41
min_speed_for_control: 0.10
front_angle_deg: 180.0

# Virtual Barrier parameters (Activity 6)
fov_deg: 120.0
safe_dist: 0.2
barrier_sector_r_deg: 65.0
barrier_sector_l_deg: 65.0
front_view_angle_deg: 24.0
d_stop: 0.2
d_tau: 0.8
k_heading: 4.5
k_center: 1.0
clearance_margin: 0.12
default_half_width: 0.90
barrier_lookahead: 1.8
smoothing_window: 5
min_gap_beams: 8
angle_bias: 0.35
steer_filter: 0.65
creep_speed: 0.18